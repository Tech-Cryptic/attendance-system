services:
  - type: web
    name: faceattend
    runtime: python
    rootDir: backend
    buildCommand: >
      cd ../frontend &&
      npm ci &&
      npm run build &&
      cd ../backend &&
      pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    region: oregon
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: faceattend-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: HMAC_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRY_MINUTES
        value: "60"
      - key: CORS_ORIGINS
        value: "*"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: FRONTEND_URL
        sync: false

databases:
  - name: faceattend-db
    plan: free
    region: oregon
    databaseName: attendance_db
